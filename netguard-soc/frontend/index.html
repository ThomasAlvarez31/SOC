<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NETGUARD SOC - COMMAND CENTER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    </head>
<body>
    <div style="background:#0a0e1a; color:white; font-family:monospace; padding:20px; min-height:100vh;">
        <h2 style="color:#00d4ff; border-bottom:1px solid #1e293b">NETGUARD_SOC_v2.5 // STATUS: ACTIVE</h2>
        
        <div style="display:grid; grid-template-columns: 1fr 300px; gap:20px; margin-top:20px;">
            <div style="background:#0f1525; padding:15px; border:1px solid #1e293b">
                <h3>TRAFFIC_MONITOR</h3>
                <table style="width:100%; text-align:left; font-size:12px;">
                    <thead>
                        <tr style="color:#8892a4">
                            <th>SOURCE_IP</th><th>PORT</th><th>PROTO</th><th>SIZE</th><th>ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="connTable"></tbody>
                </table>
            </div>

            <div style="background:#0f1525; padding:15px; border:1px solid #1e293b">
                <h3 style="color:#ff3d71">ALERT_FEED</h3>
                <div id="eventFeed" style="font-size:10px; max-height:400px; overflow-y:auto;"></div>
            </div>
        </div>
    </div>

    <script>
        const alertSound = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3');
        const whitelist = ["10.221.50.109", "127.0.0.1"];
        const incidentCache = new Set();

        const socket = new SockJS('http://localhost:8080/ws-soc');
        const stompClient = Stomp.over(socket);
        stompClient.debug = null;

        stompClient.connect({}, function () {
            stompClient.subscribe('/topic/metrics', function (message) {
                const packet = JSON.parse(message.body);
                const isOwner = whitelist.includes(packet.src);
                
                let rowStyle = "";
                let tag = "LIVE";

                if (packet.status === "CRITICAL" && !isOwner) {
                    rowStyle = "background:rgba(255, 61, 113, 0.1); color:#ff3d71";
                    tag = "⚠️ ATTACK";
                    logIncident(packet);
                } else if (isOwner) {
                    tag = "OWNER";
                    rowStyle = "color:#00ff9d";
                }

                const table = document.getElementById('connTable');
                const row = `
                    <tr style="${rowStyle}">
                        <td>${packet.src}</td>
                        <td>${packet.port}</td>
                        <td>${packet.proto}</td>
                        <td>${(packet.size / 1024).toFixed(2)} KB</td>
                        <td>
                            ${(!isOwner && packet.status === "CRITICAL") ? 
                            `<button onclick="banIp('${packet.src}')" style="background:#ff3d71; border:none; color:white; font-size:10px; cursor:pointer">BAN</button>` : '---'}
                        </td>
                    </tr>`;
                
                table.insertAdjacentHTML('afterbegin', row);
                if (table.rows.length > 15) table.deleteRow(15);
            });
        });

        function logIncident(p) {
            if (!incidentCache.has(p.src)) {
                const feed = document.getElementById('eventFeed');
                const log = `<div style="border-left:2px solid #ff3d71; padding:5px; margin-bottom:5px">
                    [${new Date().toLocaleTimeString()}] ALERT: Intrusion attempt from ${p.src}
                </div>`;
                feed.insertAdjacentHTML('afterbegin', log);
                alertSound.play();
                incidentCache.add(p.src);
                setTimeout(() => incidentCache.delete(p.src), 30000); // Cooldown de 30s
            }
        }

        function banIp(ip) {
            fetch('http://localhost:8080/api/block', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ip: ip })
            }).then(() => alert("IP " + ip + " BLOQUEADA EN FIREWALL"));
        }
    </script>
</body>
</html>
